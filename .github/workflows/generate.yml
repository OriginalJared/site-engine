name: Generate site

on:
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "templates/**"
      - "scripts/**"
      - ".github/workflows/generate.yml"
      - "index.html"

permissions:
  contents: write

concurrency:
  group: generate-site-main
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync with remote
        run: git pull --rebase origin main

      - name: Run generator
        run: python scripts/generate.py

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Always stage generated site output
          git add -A generated

          # Also stage root-level files the generator creates
          if [ -f sitemap.xml ]; then git add sitemap.xml; fi
          if [ -f robots.txt ]; then git add robots.txt; fi
          if [ -f index.html ]; then git add index.html; fi

          # Commit only if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update generated pages"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
