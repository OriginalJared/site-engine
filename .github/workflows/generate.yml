name: Generate site

on:
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "templates/**"
      - "scripts/**"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator
        run: python scripts/generate.py
