name: Generate site

on:
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "templates/**"
      - "scripts/**"
      
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator
        run: python scripts/generate.py

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated
          git commit -m "Update generated pages" || echo "No changes to commit"
          git push
