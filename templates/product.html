<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{PRODUCT_NAME}} – Review & Specs</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:900px;margin:24px auto;padding:0 16px;line-height:1.5}
      header{display:flex;gap:16px;align-items:flex-start}
      .hero{flex:1}
      .img{width:220px;min-height:160px;background:#f2f2f2;border:1px solid #ddd;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
      .img img{max-width:100%;height:auto;display:block}
      .meta{color:#555;margin-top:6px}
      .price{font-size:18px;margin:10px 0}
      .cta{display:inline-block;background:#0b5fff;color:#fff;text-decoration:none;padding:10px 14px;border-radius:10px;font-weight:600}
      .cta:hover{filter:brightness(0.95)}
      .disclosure{font-size:12px;color:#666;margin-top:10px}
      h2{margin-top:26px}
      table{border-collapse:collapse;width:100%}
      th,td{border:1px solid #ddd;padding:8px 10px;text-align:left;vertical-align:top}
      th{background:#fafafa;width:40%}
      .tags ul{margin:8px 0 0 18px}
      .back{margin-top:18px}
    </style>
  </head>

  <body>
    <header>
      <div class="hero">
        <h1>{{PRODUCT_NAME}}</h1>
        <div class="meta"><strong>Brand:</strong> {{PRODUCT_BRAND}}</div>
        <div class="price"><strong>Price (USD):</strong> {{PRODUCT_PRICE}}</div>
        <a class="cta" href="{{AFFILIATE_URL}}" rel="nofollow sponsored">Buy / Check Price</a>
        <div class="disclosure">Disclosure: This page may contain affiliate links. If you buy, we may earn a commission at no extra cost to you.</div>
      </div>

      <div class="img">
        <img src="{{IMAGE_URL}}" alt="{{PRODUCT_NAME}}" onerror="this.style.display='none'; this.parentElement.textContent='Image coming soon';">
      </div>
    </header>

    <section class="tags">
      <h2>Best For</h2>
      <div>{{BEST_FOR}}</div>
    </section>

    <section>
      <h2>Specs</h2>
      <div>{{SPECS_TABLE}}</div>
    </section>

    <div class="back">
      <a href="/generated/categories/example-category/">← Back to category</a>
    </div>
  </body>
</html>
